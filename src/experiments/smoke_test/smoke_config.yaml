experiment_name: "ablation_smoke"
seed: 42
device: "auto"

# Smaller model for fast smoke runs
model:
  model_name: "ts_encoder_smoke"
  rp_encoder: "upper_tri"  # routes build_visual_encoder_from_config → UpperTriDiagRPEncoder
  input_dim: 32
  model_dim: 64        # reduced from 256
  embedding_dim: 64    # reduced from 128
  depth: 2             # reduced from 8
  state_dim: 16
  conv_kernel: 4
  expand_factor: 1.5
  dropout: 0.0
  pooling: "mean"

data:
  dataset_type: "icml"
  dataset_name: "ETTm1.csv"
  data_dir: "../../ICML_datasets/ETT-small"
  batch_size: 64
  val_batch_size: 32
  num_workers: 0
  pin_memory: false
  val_ratio: 0.1

training:
  epochs: 3
  temperature: 0.2
  learning_rate: 0.001
  weight_decay: 0.0001
  noise_std: 0.01
  optimizer: "adamw"
  scheduler: "cosine"
  min_lr: 0.000001
  warmup_epochs: 1
  max_grad_norm: 1.0
  use_amp: false       # off for CPU-safe smoke runs

logging:
  checkpoint_dir: "../../../../checkpoints/smoke"
  save_best_only: false
  save_last: true
