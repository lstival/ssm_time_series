experiment_name: "ts_simclr_full_mv_joint"
seed: 42
device: "auto"

# Ablation MV-C: Global L2 Joint RP + FiLM fusion
# Visual encoder receives full multivariate input and computes Global L2 RP
# capturing cross-channel phase-space geometry.
# Fusion in MoP: FiLM (z_e * sigmoid(W @ z_v)) instead of concat.
# Temporal encoder remains CI.

model:
  model_name: "ts_simclr_full_mv_joint"
  rp_encoder: "upper_tri"
  input_dim: 64
  model_dim: 256
  embedding_dim: 128
  depth: 8
  state_dim: 16
  conv_kernel: 4
  expand_factor: 1.5
  dropout: 0.05
  pooling: "mean"
  rp_mv_strategy: "joint"         # Global L2 RP — Ablation MV-C
  fusion_mode: "film"             # FiLM modulation instead of concat

data:
  dataset_type: "combined"
  batch_size: 256
  val_batch_size: 128
  num_workers: 4
  pin_memory: true
  val_ratio: 0.1

  cronos_kwargs:
    context_length: 336
    cache_dir: "/lustre/nobackup/WUR/AIN/stiva001/hf_datasets"
    normalize_per_series: true
    force_offline: true
    drop_last: true
    two_views: true

training:
  epochs: 200              # 24h budget
  temperature: 0.2
  learning_rate: 0.00005
  weight_decay: 0.0001
  noise_std: 0.01
  warmup_epochs: 20
  max_grad_norm: 1.0
  use_amp: true

logging:
  checkpoint_dir: "../../checkpoints/simclr_full_mv_joint"
  save_best_only: true
  save_last: true
