experiment_name: "ts_clip_full_lotsa"
seed: 42
device: "auto"

# CLIP bimodal — FULL size with HPO-best hyperparams + ablation-best architecture:
#   A: rp_mv_strategy = mean
#   B: visual encoder = upper_tri (UpperTriDiagRPEncoder)
#   E: patch_len = 64
#   Lookback: context_length = 512 (HPO best)
#   Model size: full (model_dim=256, depth=8, embedding_dim=128)
#   Alignment: clip_symm (HPO best)
#   Dataset: combined (LOTSA + local datasets)

model:
  model_name: "ts_clip_full_lotsa"
  rp_encoder: "upper_tri"
  input_dim: 64          # patch_len — Ablation E best
  model_dim: 256         # full
  embedding_dim: 128     # full
  depth: 8               # full
  state_dim: 16
  conv_kernel: 4
  expand_factor: 1.5
  dropout: 0.05
  pooling: "mean"
  rp_mv_strategy: "mean" # Ablation A best

data:
  dataset_type: "combined"   # LOTSA + local datasets (financial, energy, mobility)
  batch_size: 256
  val_batch_size: 128
  num_workers: 4
  pin_memory: true
  val_ratio: 0.1

  cronos_kwargs:
    context_length: 512    # HPO best
    cache_dir: "/lustre/nobackup/WUR/AIN/stiva001/hf_datasets"
    normalize_per_series: true
    force_offline: true
    drop_last: true
    two_views: true

training:
  epochs: 100
  temperature: 0.20228698523800784   # HPO best
  learning_rate: 0.0003                # HPO best (nano) scaled down for full model (256-dim vs 64-dim)
  weight_decay: 0.00023300971704415705  # HPO best
  noise_std: 0.001519215433363163      # HPO best
  optimizer: "adamw"
  scheduler: "cosine"
  min_lr: 1.0e-06
  warmup_epochs: 4                  # HPO best
  max_grad_norm: 1.0
  use_amp: true
  alignment_strategy: "clip_symm"   # HPO best

logging:
  checkpoint_dir: "../../checkpoints/clip_full"
  save_best_only: true
  save_last: true
