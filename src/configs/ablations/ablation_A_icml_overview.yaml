experiment_name: "ablation_A_icml_overview"
seed: 42
device: "auto"

# Medium model — large enough for meaningful signal, fast enough for 20 epochs × 4 strategies
model:
  model_name: "ts_encoder_ablation_A"
  input_dim: 32
  model_dim: 128        # between smoke (64) and full (256)
  embedding_dim: 128
  depth: 4              # between smoke (2) and full (8)
  state_dim: 16
  conv_kernel: 4
  expand_factor: 1.5
  dropout: 0.05
  pooling: "mean"
  use_gpu_rp: true      # GPU-native RP — pca/joint fall back to CPU automatically

data:
  dataset_type: "icml"
  dataset_name: "ETTm1.csv"   # largest single ICML file (70K rows)
  data_dir: "../../ICML_datasets/ETT-small"
  batch_size: 128
  val_batch_size: 64
  num_workers: 4
  pin_memory: true
  val_ratio: 0.1

training:
  epochs: 20
  temperature: 0.2
  learning_rate: 0.001
  weight_decay: 0.0001
  noise_std: 0.01
  optimizer: "adamw"
  scheduler: "cosine"
  min_lr: 0.000001
  warmup_epochs: 2
  max_grad_norm: 1.0
  use_amp: true

logging:
  checkpoint_dir: "../../../../checkpoints/ablation_A_icml"
  save_best_only: false
  save_last: true
