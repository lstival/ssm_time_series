experiment_name: "ts_encoder_lotsa_nano"
seed: 42
device: "auto"

# Nano model — ~4x fewer parameters than ablation_best.
# Used for Ablation H full validation: 3 visual encoder variants × full LOTSA
# pre-training × all 9 ICML datasets × 4 horizons.
# Each variant takes ~1-2h on a single GPU instead of ~8h for the full model.

model:
  model_name: "ts_encoder_lotsa_nano"
  input_dim: 64          # patch size (same as ablation_best — Ablation E winner)
  model_dim: 128         # reduced from 256
  embedding_dim: 64      # reduced from 128
  depth: 4               # reduced from 8
  state_dim: 16
  conv_kernel: 4
  expand_factor: 1.5
  dropout: 0.05
  pooling: "mean"
  rp_mv_strategy: "mean"  # Ablation A winner

data:
  dataset_type: "lotsa"
  batch_size: 256
  val_batch_size: 128
  num_workers: 4
  pin_memory: true
  val_ratio: 0.1

  cronos_kwargs:
    context_length: 96
    cache_dir: "/lustre/nobackup/WUR/AIN/stiva001/hf_datasets"
    normalize_per_series: true
    force_offline: true
    drop_last: true
    two_views: true

training:
  epochs: 50             # reduced from 100
  temperature: 0.2
  learning_rate: 0.001
  weight_decay: 0.0001
  noise_std: 0.01
  optimizer: "adamw"
  scheduler: "cosine"
  min_lr: 0.000001
  warmup_epochs: 5
  max_grad_norm: 1.0
  use_amp: true
  alignment_strategy: "clip_symm"

logging:
  checkpoint_dir: "../../checkpoints/ablation_H_nano"
  save_best_only: true
  save_last: true
