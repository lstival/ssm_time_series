experiment_name: "ts_clip_full_chronos_ft"
seed: 42
device: "auto"

# CLIP bimodal FULL — encoder fine-tune on LOTSA + local + Chronos corpus.
# Resumes from the best CLIP-Full checkpoint and continues with the expanded
# corpus (adds m4_yearly, taxi_30min from Chronos offline cache).
# Reduced epochs/lr for fine-tuning regime (warm-start, not scratch).

model:
  model_name: "ts_clip_full_chronos_ft"
  rp_encoder: "upper_tri"
  input_dim: 64
  model_dim: 256
  embedding_dim: 128
  depth: 8
  state_dim: 16
  conv_kernel: 4
  expand_factor: 1.5
  dropout: 0.05
  pooling: "mean"
  rp_mv_strategy: "mean"
  proj_out_dim: 256        # match checkpoint projection head output dim

data:
  dataset_type: "combined"   # LOTSA + local + Chronos (via CHRONOS_DEFAULT_SUBSETS)
  batch_size: 256
  val_batch_size: 128
  num_workers: 4
  pin_memory: true
  val_ratio: 0.1

  cronos_kwargs:
    context_length: 512
    cache_dir: "/lustre/nobackup/WUR/AIN/stiva001/hf_datasets"
    normalize_per_series: true
    force_offline: true
    drop_last: true
    two_views: true

training:
  epochs: 30                  # fine-tune: fewer epochs, warm-start
  temperature: 0.20228698523800784
  learning_rate: 0.00005      # ~6× lower than original for fine-tuning
  weight_decay: 0.00023300971704415705
  noise_std: 0.001519215433363163
  optimizer: "adamw"
  scheduler: "cosine"
  min_lr: 1.0e-07
  warmup_epochs: 3
  max_grad_norm: 1.0
  use_amp: true
  alignment_strategy: "clip_symm"

logging:
  checkpoint_dir: "../../checkpoints/clip_full_chronos_ft"
  save_best_only: true
  save_last: true
