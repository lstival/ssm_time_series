experiment_name: "ts_simclr_micro_icml"
seed: 42
device: "auto"

# SimCLR bimodal — MICRO size trained ONLY on ICML benchmark datasets.
# Purpose: supervised-domain baseline — same data seen during linear probe evaluation.
# Micro size: model_dim=64, embedding_dim=32, depth=6 (HPO best architecture).
# ICML datasets: ett_h1, ett_h2, ett_m1, ett_m2, electricity_hourly,
#                traffic_hourly, exchange_rate  (weather has no LOTSA equivalent).

model:
  model_name: "ts_simclr_micro_icml"
  rp_encoder: "upper_tri"
  input_dim: 64            # patch_len
  model_dim: 64            # micro
  embedding_dim: 32        # micro
  depth: 6                 # micro (HPO best)
  state_dim: 16
  conv_kernel: 4
  expand_factor: 1.5
  dropout: 0.05
  pooling: "mean"
  rp_mv_strategy: "mean"

data:
  dataset_type: "lotsa"
  # Explicit list: exactly the ICML probe benchmark datasets
  datasets:
    - "ett_h1"
    - "ett_h2"
    - "ett_m1"
    - "ett_m2"
    - "electricity_hourly"
    - "traffic_hourly"
    - "exchange_rate"
  batch_size: 128
  val_batch_size: 64
  num_workers: 4
  pin_memory: true
  val_ratio: 0.1

  cronos_kwargs:
    context_length: 512
    cache_dir: "/lustre/nobackup/WUR/AIN/stiva001/hf_datasets"
    normalize_per_series: true
    force_offline: true
    drop_last: true
    two_views: true

training:
  epochs: 50
  temperature: 0.20228698523800784
  learning_rate: 0.001188922928778231
  weight_decay: 0.00023300971704415705
  noise_std: 0.001519215433363163
  optimizer: "adamw"
  scheduler: "cosine"
  min_lr: 1.0e-06
  warmup_epochs: 4
  max_grad_norm: 1.0
  use_amp: true

logging:
  checkpoint_dir: "../../checkpoints/icml_simclr_micro"
  save_best_only: true
  save_last: true
