experiment_name: "ts_gram_full_lotsa"
seed: 42
device: "auto"

# GRAM — FULL size with ablation-best settings:
#   A: rp_mv_strategy = mean
#   B: visual encoder = upper_tri (UpperTriDiagRPEncoder)
#   D: visual representation = rp
#   E: patch_len = 64
#   Lookback: context_length = 336 (ablation lookback best overall)
#   Model size: full (model_dim=256, depth=8, embedding_dim=128)

model:
  model_name: "ts_gram_full_lotsa"
  rp_encoder: "upper_tri"
  input_dim: 64          # patch_len — Ablation E best
  model_dim: 256         # full
  embedding_dim: 128     # full
  depth: 8               # full
  state_dim: 16
  conv_kernel: 4
  expand_factor: 1.5
  dropout: 0.05
  pooling: "mean"
  rp_mv_strategy: "mean" # Ablation A best

data:
  dataset_type: "combined"   # LOTSA + local datasets (financial, energy, mobility)
  batch_size: 256
  val_batch_size: 128
  num_workers: 4
  pin_memory: true
  val_ratio: 0.1

  cronos_kwargs:
    context_length: 336    # ablation lookback best overall
    cache_dir: "/lustre/nobackup/WUR/AIN/stiva001/hf_datasets"
    normalize_per_series: true
    force_offline: true
    drop_last: true
    two_views: true

training:
  epochs: 100
  temperature: 0.2
  learning_rate: 0.001
  weight_decay: 0.0001
  noise_std: 0.01
  max_grad_norm: 1.0
  warmup_epochs: 5
  use_amp: true

logging:
  checkpoint_dir: "../../checkpoints/gram_full"
  save_best_only: true
  save_last: true
