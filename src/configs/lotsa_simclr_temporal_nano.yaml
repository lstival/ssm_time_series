experiment_name: "ts_simclr_temporal_nano_lotsa"
seed: 42
device: "auto"

# SimCLR temporal-only — NANO size with ablation-best settings:
#   E: patch_len = 64
#   Lookback: context_length = 336 (ablation lookback best overall)
#   Model size: nano (model_dim=128, depth=4, embedding_dim=64)
#   Unimodal: temporal branch only (MambaEncoder), no RP/visual branch.

model:
  model_name: "ts_simclr_temporal_nano"
  rp_encoder: "temporal"          # simclr_training.py uses MambaEncoder in temporal mode
  input_dim: 64                   # patch_len — Ablation E best
  model_dim: 128                  # nano
  embedding_dim: 64               # nano
  depth: 4                        # nano
  state_dim: 16
  conv_kernel: 4
  expand_factor: 1.5
  dropout: 0.05
  pooling: "mean"

data:
  dataset_type: "lotsa"
  batch_size: 256
  val_batch_size: 128
  num_workers: 4
  pin_memory: true
  val_ratio: 0.1

  cronos_kwargs:
    context_length: 336           # ablation lookback best overall
    cache_dir: "/lustre/nobackup/WUR/AIN/stiva001/hf_datasets"
    normalize_per_series: true
    force_offline: true
    drop_last: true
    two_views: true

training:
  epochs: 100
  temperature: 0.2                # consistent with SimCLR-best nano (not 0.07 full)
  learning_rate: 0.001
  weight_decay: 0.0001
  noise_std: 0.01
  optimizer: "adamw"
  scheduler: "cosine"
  min_lr: 0.000001
  warmup_epochs: 5
  max_grad_norm: 1.0
  use_amp: true

logging:
  checkpoint_dir: "../../checkpoints/simclr_temporal_nano"
  save_best_only: true
  save_last: true
