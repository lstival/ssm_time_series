experiment_name: "ts_byol_bimodal_full_lotsa"
seed: 42
device: "auto"

# BYOL bimodal — FULL size, matching SimCLR-Full conditions:
#   - dataset_type: combined  (LOTSA + local datasets)
#   - context_length: 336
#   - model_dim=256, depth=8, embedding_dim=128
#   - proj_dim / pred_dim scaled proportionally from nano (2x / 1x embedding_dim)
#   - lr: 0.0003 (same as SimCLR-Full — scaled down for 256-dim to prevent collapse)
#   - noise_std: 0.05, ema_tau: 0.996 (BYOL best practice)

model:
  model_name: "ts_byol_bimodal_full_lotsa"
  rp_encoder: "upper_tri"
  input_dim: 64          # patch_len
  model_dim: 256         # full
  embedding_dim: 128     # full
  depth: 8               # full
  state_dim: 16
  conv_kernel: 4
  expand_factor: 1.5
  dropout: 0.05
  pooling: "mean"
  rp_mv_strategy: "mean"
  proj_dim: 256          # 2× embedding_dim
  pred_dim: 128          # = embedding_dim

data:
  dataset_type: "combined"   # LOTSA + local datasets (financial, energy, mobility)
  batch_size: 256
  val_batch_size: 128
  num_workers: 4
  pin_memory: true
  val_ratio: 0.1

  cronos_kwargs:
    context_length: 336
    cache_dir: "/lustre/nobackup/WUR/AIN/stiva001/hf_datasets"
    normalize_per_series: true
    force_offline: true
    drop_last: true
    two_views: false           # BYOL generates views via noise augmentation internally

training:
  epochs: 100
  learning_rate: 0.0003       # same as SimCLR-Full (scaled for 256-dim stability)
  weight_decay: 0.0001
  noise_std: 0.05             # stronger augmentation — BYOL best practice
  ema_tau: 0.996              # EMA momentum for target network
  optimizer: "adamw"
  warmup_epochs: 10
  max_grad_norm: 1.0
  use_amp: true

logging:
  checkpoint_dir: "../../checkpoints/byol_bimodal_full"
  save_best_only: true
  save_last: true
