experiment_name: "ts_vl_jepa_best_lotsa"
seed: 42
device: "auto"

# VL-JEPA nano retrained with CLIP-best-nano settings:
#   context_length: 336  (same as simclr-best / clip-best-nano)
#   lr: 0.001, use_amp: true, two_views: true
#   model size: nano (model_dim=128, depth=4, embedding_dim=64)

model:
  model_name: "ts_vl_jepa_best_lotsa"
  rp_encoder: "upper_tri"
  input_dim: 64          # patch_len — nano
  model_dim: 128         # nano
  embedding_dim: 64      # nano
  depth: 4               # nano
  state_dim: 16
  conv_kernel: 4
  expand_factor: 1.5
  dropout: 0.05
  pooling: "mean"
  proj_dim: 128          # projector hidden dim
  pred_dim: 64           # predictor output dim
  rp_mv_strategy: "mean"

data:
  dataset_type: "lotsa"
  batch_size: 256
  val_batch_size: 128
  num_workers: 4
  pin_memory: true
  val_ratio: 0.1

  cronos_kwargs:
    context_length: 336    # same as clip-best-nano / simclr-best
    cache_dir: "/lustre/nobackup/WUR/AIN/stiva001/hf_datasets"
    normalize_per_series: true
    force_offline: true
    drop_last: true
    two_views: true

training:
  epochs: 100
  learning_rate: 0.001
  weight_decay: 0.0001
  noise_std: 0.01
  ema_tau: 0.996
  warmup_epochs: 5
  max_grad_norm: 1.0
  use_amp: true

logging:
  checkpoint_dir: "../../checkpoints/vl_jepa_best"
  save_best_only: true
  save_last: true
