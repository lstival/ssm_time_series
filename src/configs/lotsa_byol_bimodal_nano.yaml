experiment_name: "ts_byol_bimodal_nano_lotsa"
seed: 42
device: "auto"

# Nano-size BYOL bimodal model:
#   - Architecture follows the nano configs of CLIP/GRAM/SimCLR bimodal (for fair comparison)
#   - Hyperparameters follow the unimodal BYOL best (stronger noise_std=0.05, ema_tau=0.996)
#   - Loss: intra-temporal + intra-visual + 0.5 * cross-modal (both directions)
model:
  model_name: "ts_byol_bimodal_nano_lotsa"
  rp_encoder: "upper_tri"
  input_dim: 64          # patch_len — same as other nano models
  model_dim: 128         # nano
  embedding_dim: 64      # nano
  depth: 4               # nano
  state_dim: 16
  conv_kernel: 4
  expand_factor: 1.5
  dropout: 0.05
  pooling: "mean"
  rp_mv_strategy: "mean"
  proj_dim: 128          # projector output (2× embedding_dim, with BN)
  pred_dim: 64           # predictor hidden (= embedding_dim)

data:
  dataset_type: "lotsa"
  batch_size: 256
  val_batch_size: 128
  num_workers: 4
  pin_memory: true
  val_ratio: 0.1

  cronos_kwargs:
    context_length: 96
    cache_dir: "/lustre/nobackup/WUR/AIN/stiva001/hf_datasets"
    normalize_per_series: true
    force_offline: true
    drop_last: true
    two_views: false               # BYOL generates views via noise augmentation internally

training:
  epochs: 100
  learning_rate: 0.0003           # BYOL best (lower than SimCLR 0.001)
  weight_decay: 0.0001
  noise_std: 0.05                 # stronger augmentation than SimCLR (0.01) — BYOL best practice
  ema_tau: 0.996                  # EMA momentum for target network
  optimizer: "adamw"
  warmup_epochs: 10
  use_amp: true

logging:
  checkpoint_dir: "../../checkpoints/byol_bimodal_nano"
  save_best_only: true
  save_last: true
