experiment_name: "ts_encoder_lotsa_micro"
seed: 42
device: "auto"

# Micro model — smallest size, for fast ablation runs.
# model_dim=64, embedding_dim=32, depth=6 (same as icml_*_micro HPO best).
# ~4x fewer parameters than nano (model_dim=128).

model:
  model_name: "ts_encoder_lotsa_micro"
  input_dim: 64          # patch size (Ablation E winner)
  model_dim: 64          # micro (vs nano=128)
  embedding_dim: 32      # micro (vs nano=64)
  depth: 6               # micro HPO best (vs nano=4)
  state_dim: 16
  conv_kernel: 4
  expand_factor: 1.5
  dropout: 0.05
  pooling: "mean"
  rp_mv_strategy: "mean"  # Ablation A winner

data:
  dataset_type: "lotsa"
  batch_size: 256
  val_batch_size: 128
  num_workers: 4
  pin_memory: true
  val_ratio: 0.1

  cronos_kwargs:
    context_length: 336
    cache_dir: "/lustre/nobackup/WUR/AIN/stiva001/hf_datasets"
    normalize_per_series: true
    force_offline: true
    drop_last: true
    two_views: true

training:
  epochs: 50
  temperature: 0.2
  learning_rate: 0.001
  weight_decay: 0.0001
  noise_std: 0.01
  optimizer: "adamw"
  scheduler: "cosine"
  min_lr: 0.000001
  warmup_epochs: 5
  max_grad_norm: 1.0
  use_amp: true
  alignment_strategy: "clip_symm"

logging:
  checkpoint_dir: "../../checkpoints/ablation_H_micro"
  save_best_only: true
  save_last: true
