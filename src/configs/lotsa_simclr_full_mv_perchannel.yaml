experiment_name: "ts_simclr_full_mv_perchannel"
seed: 42
device: "auto"

# Ablation MV-D: Per-channel RP stacking
# Visual encoder computes a separate RP per channel, then averages across channels.
# Each channel's RP is a (L,L) image — the average captures shared recurrence structure.
# Temporal encoder remains CI. Fusion: standard concat.

model:
  model_name: "ts_simclr_full_mv_perchannel"
  rp_encoder: "upper_tri"
  input_dim: 64
  model_dim: 256
  embedding_dim: 128
  depth: 8
  state_dim: 16
  conv_kernel: 4
  expand_factor: 1.5
  dropout: 0.05
  pooling: "mean"
  rp_mv_strategy: "per_channel"   # Ablation MV-D

data:
  dataset_type: "combined"
  batch_size: 256
  val_batch_size: 128
  num_workers: 4
  pin_memory: true
  val_ratio: 0.1

  cronos_kwargs:
    context_length: 336
    cache_dir: "/lustre/nobackup/WUR/AIN/stiva001/hf_datasets"
    normalize_per_series: true
    force_offline: true
    drop_last: true
    two_views: true

training:
  epochs: 200              # 24h budget
  temperature: 0.2
  learning_rate: 0.00005
  weight_decay: 0.0001
  noise_std: 0.01
  warmup_epochs: 20
  max_grad_norm: 1.0
  use_amp: true

logging:
  checkpoint_dir: "../../checkpoints/simclr_full_mv_perchannel"
  save_best_only: true
  save_last: true
