experiment_name: ts_hpo_best_lotsa
seed: 42
device: auto
model:
  model_name: ts_best_lotsa
  rp_encoder: upper_tri
  input_dim: 64
  model_dim: 64
  embedding_dim: 32
  depth: 6
  state_dim: 16
  conv_kernel: 4
  expand_factor: 1.5
  dropout: 0.05
  pooling: mean
  rp_mv_strategy: mean
data:
  dataset_type: lotsa
  batch_size: 256
  val_batch_size: 128
  num_workers: 4
  pin_memory: true
  val_ratio: 0.1
  cronos_kwargs:
    context_length: 512
    cache_dir: /lustre/nobackup/WUR/AIN/stiva001/hf_datasets
    normalize_per_series: true
    force_offline: true
    drop_last: true
    two_views: true
training:
  epochs: 100
  temperature: 0.20228698523800784
  learning_rate: 0.001188922928778231
  weight_decay: 0.00023300971704415705
  noise_std: 0.001519215433363163
  optimizer: adamw
  scheduler: cosine
  min_lr: 1.0e-06
  warmup_epochs: 4
  max_grad_norm: 1.0
  use_amp: true
  alignment_strategy: clip_symm
logging:
  checkpoint_dir: ../../checkpoints/hpo_best
  save_best_only: true
  save_last: true
