experiment_name: "ts_best_lotsa"
seed: 42
device: "auto"

# Best configuration from ablation studies:
#   A: rp_mv_strategy = mean
#   B: visual encoder = upper_tri (UpperTriDiagRPEncoder, sep_mamba_1d)
#   C: alignment_strategy = clip_symm (cosine_mse)
#   D: visual representation = rp
#   E: patch_len = 64
#   H: rp_ss2d scan = upper_tri (anti-diagonal)
#   Lookback: context_length = 336 (best overall)
#   SSL method: CLIP (most robust across datasets)

model:
  model_name: "ts_best_lotsa"
  rp_encoder: "upper_tri"
  input_dim: 64          # patch_len — Ablation E best
  model_dim: 128         # nano size
  embedding_dim: 64      # nano size
  depth: 4               # nano size
  state_dim: 16
  conv_kernel: 4
  expand_factor: 1.5
  dropout: 0.05
  pooling: "mean"
  rp_mv_strategy: "mean" # Ablation A best

data:
  dataset_type: "lotsa"
  batch_size: 256
  val_batch_size: 128
  num_workers: 4
  pin_memory: true
  val_ratio: 0.1

  cronos_kwargs:
    context_length: 336    # Ablation lookback best overall
    cache_dir: "/lustre/nobackup/WUR/AIN/stiva001/hf_datasets"
    normalize_per_series: true
    force_offline: true
    drop_last: true
    two_views: true

training:
  epochs: 100
  temperature: 0.2
  learning_rate: 0.001
  weight_decay: 0.0001
  noise_std: 0.01
  optimizer: "adamw"
  scheduler: "cosine"
  min_lr: 0.000001
  warmup_epochs: 5
  max_grad_norm: 1.0
  use_amp: true
  alignment_strategy: "clip_symm"  # Ablation C best (cosine_mse / CLIP symmetric)

logging:
  checkpoint_dir: "../../checkpoints/best"
  save_best_only: true
  save_last: true
