experiment_name: "ts_clip_temporal_lotsa"
seed: 42
device: "auto"

# CLIP temporal-only unimodal — full size, HPO-best hyperparams, combined dataset.
# Two augmented views of the raw time series form the positive pair (NT-Xent / clip_symm).
# No visual/RP branch — temporal encoder only.

model:
  model_name: "ts_clip_temporal_lotsa"
  rp_encoder: "temporal"           # simclr_training.py → MambaEncoder (temporal mode)
  input_dim: 64                    # patch_len — Ablation E best
  model_dim: 256                   # full
  embedding_dim: 128               # full
  depth: 8                         # full
  state_dim: 16
  conv_kernel: 4
  expand_factor: 1.5
  dropout: 0.05
  pooling: "mean"

data:
  dataset_type: "combined"         # LOTSA + local datasets
  batch_size: 256
  val_batch_size: 128
  num_workers: 4
  pin_memory: true
  val_ratio: 0.1

  cronos_kwargs:
    context_length: 512            # HPO best
    cache_dir: "/lustre/nobackup/WUR/AIN/stiva001/hf_datasets"
    normalize_per_series: true
    force_offline: true
    drop_last: true
    two_views: true

training:
  epochs: 100
  temperature: 0.20228698523800784   # HPO best
  learning_rate: 0.001188922928778231  # HPO best
  weight_decay: 0.00023300971704415705
  noise_std: 0.001519215433363163
  optimizer: "adamw"
  scheduler: "cosine"
  min_lr: 1.0e-06
  warmup_epochs: 4
  max_grad_norm: 1.0
  use_amp: true

logging:
  checkpoint_dir: "../../checkpoints/clip_temporal"
  save_best_only: true
  save_last: true
